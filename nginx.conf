# ── HTTP: redirect to HTTPS ─────────────────────────────────
server {
    listen 80;
    server_name _;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name sept.ooo;   # ← replace with your domain

    ssl_certificate     /etc/letsencrypt/live/sept.ooo/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sept.ooo/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Compression
    gzip on;
    gzip_types text/html text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    # Static GTFS data — cache aggressively (rebuilt infrequently)
    location /static/ {
        proxy_pass http://127.0.0.1:5000;
        add_header Cache-Control "public, max-age=86400";  # 1 day
    }

    # JS/CSS source — cache for 1 hour (version bump clears it)
    location /src/ {
        proxy_pass http://127.0.0.1:5000;
        add_header Cache-Control "public, max-age=3600";
    }

    # API — never cache (real-time data)
    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-store";
    }

    # HTML + everything else
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
