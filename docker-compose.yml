services:
  app:
    build: .
    restart: unless-stopped
    volumes:
      - ./data:/app/data   # persist trip stats across restarts
    environment:
      - PYTHONUNBUFFERED=1
    expose:
      - "5000"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro   # certbot manages certs on the host
    depends_on:
      - app
