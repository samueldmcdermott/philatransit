version: "3.9"

services:
  app:
    build: .
    restart: unless-stopped
    volumes:
      - trip_data:/app/data   # persist trip stats across restarts
    environment:
      - PYTHONUNBUFFERED=1
    expose:
      - "5000"              # internal only — nginx proxies to http://app:5000

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro   # certbot manages certs on the host
    depends_on:
      - app

volumes:
  trip_data:
